<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Star Trek: The Long Game</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: #0a0a0a;
  color: #d4d4d4;
  font-family: -apple-system, system-ui, sans-serif;
  min-height: 100vh;
}
header {
  text-align: center;
  padding: 24px 16px 8px;
  border-bottom: 1px solid #222;
}
header h1 {
  font-size: 18px;
  font-weight: 600;
  color: #e8e8e8;
  letter-spacing: 2px;
  text-transform: uppercase;
}
header h2 {
  font-size: 13px;
  color: #666;
  font-style: italic;
  margin-top: 4px;
}

/* Tabs */
.tabs {
  display: flex;
  max-width: 600px;
  margin: 0 auto;
  border-bottom: 1px solid #222;
}
.tab {
  flex: 1;
  text-align: center;
  padding: 10px;
  font-size: 13px;
  color: #666;
  cursor: pointer;
  border-bottom: 2px solid transparent;
  -webkit-tap-highlight-color: transparent;
}
.tab.active {
  color: #4a9eff;
  border-bottom-color: #4a9eff;
}

/* Scene list */
.scenes {
  max-width: 600px;
  margin: 0 auto;
  padding: 8px 16px 180px;
}
.scene {
  padding: 12px 0;
  border-bottom: 1px solid #1a1a1a;
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
}
.scene.active {
  background: #111;
  margin: 0 -16px;
  padding: 12px 16px;
  border-radius: 8px;
  border-bottom: none;
}
.scene-header {
  display: flex;
  align-items: center;
  gap: 10px;
}
.scene-num {
  font-size: 12px;
  color: #555;
  font-variant-numeric: tabular-nums;
  min-width: 24px;
}
.scene-title {
  font-size: 15px;
  color: #999;
  flex: 1;
}
.scene.active .scene-title { color: #e8e8e8; }
.scene.played .scene-title { color: #666; }
.scene-duration {
  font-size: 12px;
  color: #444;
  font-variant-numeric: tabular-nums;
}

/* Text view */
.text-view {
  display: none;
  max-width: 600px;
  margin: 0 auto;
  padding: 0 16px 180px;
}
.text-view.visible { display: block; }
.text-scene-title {
  font-size: 16px;
  color: #e8e8e8;
  text-align: center;
  padding: 16px 0 12px;
  border-bottom: 1px solid #1a1a1a;
  margin-bottom: 16px;
}
.text-content {
  font-size: 14px;
  line-height: 1.7;
  color: #bbb;
}
.text-content .direction {
  color: #666;
  font-style: italic;
  margin: 12px 0;
}
.text-content .character {
  color: #4a9eff;
  font-weight: 600;
  margin-top: 16px;
  margin-bottom: 2px;
}
.text-content .dialogue {
  margin-bottom: 8px;
}
.text-content .parenthetical {
  color: #888;
  font-style: italic;
  font-size: 13px;
}
.text-content .separator {
  border: none;
  border-top: 1px solid #1a1a1a;
  margin: 16px 0;
}
.text-content .scene-heading {
  color: #555;
  font-size: 12px;
  text-transform: uppercase;
  letter-spacing: 1px;
  margin: 16px 0 8px;
}
.scroll-indicator {
  text-align: center;
  padding: 20px;
  color: #333;
  font-size: 12px;
}

/* Fixed bottom player */
.player {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  background: #111;
  border-top: 1px solid #2a2a2a;
  padding: 0 0 env(safe-area-inset-bottom);
  z-index: 100;
}
.player-inner {
  max-width: 600px;
  margin: 0 auto;
  padding: 12px 16px 16px;
}
.player-title {
  font-size: 13px;
  color: #e8e8e8;
  text-align: center;
  margin-bottom: 8px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.slider-row {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 12px;
}
.slider-row .time {
  font-size: 11px;
  color: #666;
  font-variant-numeric: tabular-nums;
  min-width: 38px;
}
.slider-row .time.right { text-align: right; }
input[type="range"] {
  -webkit-appearance: none;
  appearance: none;
  flex: 1;
  height: 4px;
  background: #333;
  border-radius: 2px;
  outline: none;
}
input[type="range"]::-webkit-slider-thumb {
  -webkit-appearance: none;
  appearance: none;
  width: 16px;
  height: 16px;
  background: #4a9eff;
  border-radius: 50%;
  cursor: pointer;
}
.controls {
  display: flex;
  justify-content: center;
  align-items: center;
  gap: 24px;
}
.btn {
  background: none;
  border: none;
  color: #d4d4d4;
  cursor: pointer;
  padding: 8px;
  font-size: 20px;
  line-height: 1;
  -webkit-tap-highlight-color: transparent;
}
.btn:active { opacity: 0.5; }
.btn-play { font-size: 28px; }
.btn-skip { font-size: 16px; color: #888; }
.btn-rw { font-size: 16px; color: #888; }
</style>
</head>
<body>

<header>
  <h1>Star Trek: The Long Game</h1>
  <h2>Grey Water</h2>
</header>

<div class="tabs">
  <div class="tab active" id="tab-scenes">Scenes</div>
  <div class="tab" id="tab-text">Text</div>
</div>

<div class="scenes" id="scene-list"></div>

<div class="text-view" id="text-view">
  <div class="text-scene-title" id="text-scene-title">Select a scene</div>
  <div class="text-content" id="text-content"></div>
  <div class="scroll-indicator" id="scroll-end"></div>
</div>

<div class="player">
  <div class="player-inner">
    <div class="player-title" id="player-title">Select a scene</div>
    <div class="slider-row">
      <span class="time" id="time-current">0:00</span>
      <input type="range" id="slider" min="0" max="100" value="0" step="0.1">
      <span class="time right" id="time-total">0:00</span>
    </div>
    <div class="controls">
      <button class="btn btn-rw" id="btn-rw" title="Back 15s">-15</button>
      <button class="btn btn-skip" id="btn-prev" title="Previous scene">&#9198;</button>
      <button class="btn btn-play" id="btn-play">&#9654;</button>
      <button class="btn btn-skip" id="btn-next" title="Next scene">&#9197;</button>
      <button class="btn btn-rw" id="btn-ff" title="Forward 15s">+15</button>
    </div>
  </div>
</div>

<script>
const BASE_AUDIO = "https://raw.githubusercontent.com/karskiliini/startrek-thelonggame/main/audio/";
const BASE_TEXT = "https://raw.githubusercontent.com/karskiliini/startrek-thelonggame/main/";
const scenes = [
  { file: "00_opening_credits", num: "00", title: "Opening Credits — The Rocks" },
  { file: "01_the_table", num: "01", title: "The Table" },
  { file: "02_orders", num: "02", title: "Orders" },
  { file: "03_the_dinner", num: "03", title: "The Dinner" },
  { file: "04_grey_water", num: "04", title: "Grey Water" },
  { file: "05_the_incident", num: "05", title: "The Incident" },
  { file: "06_the_call", num: "06", title: "The Call" },
  { file: "07_the_cook", num: "07", title: "The Cook" },
  { file: "08_the_order", num: "08", title: "The Order" },
  { file: "09_ready_room", num: "09", title: "Ready Room" },
  { file: "10_sorak_hand", num: "10", title: "Sorak's Hand" },
  { file: "11_ktagh", num: "11", title: "K'Tagh" },
  { file: "12_the_belt", num: "12", title: "The Belt" },
  { file: "13_the_canyon", num: "13", title: "The Canyon" },
  { file: "14_the_conn", num: "14", title: "The Conn" },
  { file: "15_kobayashi_maru", num: "15", title: "Kobayashi Maru" },
  { file: "16_anyones_to_win", num: "16", title: "Anyone's to Win" },
];

let currentIndex = -1;
let isPlaying = false;
let userScrolled = false;
let scrollTimeout = null;
let activeTab = "scenes";
const textCache = {};

const audio = new Audio();
const slider = document.getElementById("slider");
const timeCurrent = document.getElementById("time-current");
const timeTotal = document.getElementById("time-total");
const btnPlay = document.getElementById("btn-play");
const playerTitle = document.getElementById("player-title");
const sceneList = document.getElementById("scene-list");
const textView = document.getElementById("text-view");
const textContent = document.getElementById("text-content");
const textSceneTitle = document.getElementById("text-scene-title");

function fmt(s) {
  if (isNaN(s)) return "0:00";
  const m = Math.floor(s / 60);
  const sec = Math.floor(s % 60);
  return m + ":" + (sec < 10 ? "0" : "") + sec;
}

// Tabs
document.getElementById("tab-scenes").addEventListener("click", () => switchTab("scenes"));
document.getElementById("tab-text").addEventListener("click", () => switchTab("text"));

function switchTab(tab) {
  activeTab = tab;
  document.getElementById("tab-scenes").classList.toggle("active", tab === "scenes");
  document.getElementById("tab-text").classList.toggle("active", tab === "text");
  sceneList.style.display = tab === "scenes" ? "block" : "none";
  textView.classList.toggle("visible", tab === "text");
  if (tab === "text" && currentIndex >= 0) loadText(currentIndex);
}

// Markdown to HTML
function mdToHtml(md) {
  const lines = md.split("\n");
  let html = "";
  for (let line of lines) {
    line = line.trimEnd();
    // Skip top-level headers (scene title already shown)
    if (/^#{1,2}\s/.test(line)) continue;
    // Scene headings (backtick lines)
    if (/^`.*`$/.test(line)) {
      html += `<div class="scene-heading">${line.replace(/`/g, "")}</div>`;
      continue;
    }
    // Horizontal rules
    if (/^---$/.test(line)) {
      html += `<hr class="separator">`;
      continue;
    }
    // Character names (bold uppercase)
    const charMatch = line.match(/^\*\*([A-Z][A-Z '\-]+(?:\s*\*\(CONT'D\)\*)?)\*\*$/);
    if (charMatch) {
      html += `<div class="character">${charMatch[1].replace(/\*/g, "")}</div>`;
      continue;
    }
    // Parentheticals
    if (/^\*\(.*\)\*$/.test(line)) {
      html += `<div class="parenthetical">${line.replace(/\*/g, "")}</div>`;
      continue;
    }
    // Empty lines
    if (line.trim() === "") {
      continue;
    }
    // Stage directions (italics - full line)
    if (/^\*[^*]/.test(line) && line.endsWith("*")) {
      html += `<div class="direction">${line.replace(/\*/g, "")}</div>`;
      continue;
    }
    // Regular text — could be direction or dialogue
    // Strip remaining markdown formatting
    let clean = line
      .replace(/\*\*([^*]+)\*\*/g, "<strong>$1</strong>")
      .replace(/\*([^*]+)\*/g, "<em>$1</em>");
    html += `<div class="dialogue">${clean}</div>`;
  }
  return html;
}

// Load scene text
async function loadText(i) {
  if (textCache[i]) {
    textContent.innerHTML = textCache[i];
    textSceneTitle.textContent = `${scenes[i].num} — ${scenes[i].title}`;
    userScrolled = false;
    return;
  }
  textSceneTitle.textContent = `${scenes[i].num} — ${scenes[i].title}`;
  textContent.innerHTML = `<div class="direction">Loading...</div>`;
  try {
    const resp = await fetch(BASE_TEXT + scenes[i].file + ".md");
    const md = await resp.text();
    const html = mdToHtml(md);
    textCache[i] = html;
    textContent.innerHTML = html;
    userScrolled = false;
  } catch (e) {
    textContent.innerHTML = `<div class="direction">Failed to load text</div>`;
  }
}

// Auto-scroll sync with audio
function autoScroll() {
  if (activeTab !== "text" || !isPlaying || userScrolled) return;
  if (!audio.duration || audio.duration === 0) return;

  const progress = audio.currentTime / (audio.duration * 0.95); // finish scroll at 95%
  const clamped = Math.min(1, Math.max(0, progress));

  const docHeight = document.documentElement.scrollHeight;
  const winHeight = window.innerHeight;
  const playerHeight = 140;
  const maxScroll = docHeight - winHeight;

  if (maxScroll <= 0) return;

  window.scrollTo({
    top: clamped * maxScroll,
    behavior: "auto"
  });
}

// Detect user manual scroll
window.addEventListener("touchstart", () => {
  userScrolled = true;
  clearTimeout(scrollTimeout);
  scrollTimeout = setTimeout(() => { userScrolled = false; }, 5000);
}, { passive: true });

window.addEventListener("wheel", () => {
  userScrolled = true;
  clearTimeout(scrollTimeout);
  scrollTimeout = setTimeout(() => { userScrolled = false; }, 5000);
}, { passive: true });

// Build scene list
scenes.forEach((s, i) => {
  const div = document.createElement("div");
  div.className = "scene";
  div.dataset.index = i;
  div.innerHTML = `
    <div class="scene-header">
      <span class="scene-num">${s.num}</span>
      <span class="scene-title">${s.title}</span>
      <span class="scene-duration" id="dur-${i}"></span>
    </div>
  `;
  div.addEventListener("click", () => playScene(i));
  sceneList.appendChild(div);
});

function playScene(i) {
  if (i < 0 || i >= scenes.length) return;
  currentIndex = i;
  audio.src = BASE_AUDIO + scenes[i].file + ".mp3";
  audio.play();
  isPlaying = true;
  userScrolled = false;
  btnPlay.innerHTML = "&#9646;&#9646;";
  playerTitle.textContent = `${scenes[i].num} — ${scenes[i].title}`;
  updateActiveScene();
  if (activeTab === "text") {
    loadText(i);
    window.scrollTo({ top: 0, behavior: "auto" });
  }
}

function updateActiveScene() {
  document.querySelectorAll(".scene").forEach((el, i) => {
    el.classList.remove("active", "played");
    if (i === currentIndex) el.classList.add("active");
    else if (i < currentIndex) el.classList.add("played");
  });
  if (activeTab === "scenes") {
    const active = document.querySelector(".scene.active");
    if (active) active.scrollIntoView({ behavior: "smooth", block: "nearest" });
  }
}

// Play/pause
btnPlay.addEventListener("click", () => {
  if (currentIndex === -1) { playScene(0); return; }
  if (isPlaying) { audio.pause(); isPlaying = false; btnPlay.innerHTML = "&#9654;"; }
  else { audio.play(); isPlaying = true; btnPlay.innerHTML = "&#9646;&#9646;"; }
});

// Skip
document.getElementById("btn-prev").addEventListener("click", () => {
  if (audio.currentTime > 3) { audio.currentTime = 0; window.scrollTo({ top: 0 }); userScrolled = false; }
  else { playScene(currentIndex - 1); }
});
document.getElementById("btn-next").addEventListener("click", () => playScene(currentIndex + 1));

// Rewind/FF
document.getElementById("btn-rw").addEventListener("click", () => { audio.currentTime = Math.max(0, audio.currentTime - 15); });
document.getElementById("btn-ff").addEventListener("click", () => { audio.currentTime = Math.min(audio.duration, audio.currentTime + 15); });

// Slider
let dragging = false;
slider.addEventListener("input", () => { dragging = true; });
slider.addEventListener("change", () => {
  audio.currentTime = (slider.value / 100) * audio.duration;
  dragging = false;
  userScrolled = false; // resume auto-scroll after seeking
});

// Time update
audio.addEventListener("timeupdate", () => {
  if (!dragging) slider.value = (audio.currentTime / audio.duration) * 100;
  timeCurrent.textContent = fmt(audio.currentTime);
  autoScroll();
});

audio.addEventListener("loadedmetadata", () => {
  timeTotal.textContent = fmt(audio.duration);
  const durEl = document.getElementById(`dur-${currentIndex}`);
  if (durEl) durEl.textContent = fmt(audio.duration);
});

// Auto-advance
audio.addEventListener("ended", () => {
  if (currentIndex < scenes.length - 1) playScene(currentIndex + 1);
  else { isPlaying = false; btnPlay.innerHTML = "&#9654;"; }
});

// Preload durations
scenes.forEach((s, i) => {
  const tmp = new Audio();
  tmp.preload = "metadata";
  tmp.src = BASE_AUDIO + s.file + ".mp3";
  tmp.addEventListener("loadedmetadata", () => {
    const el = document.getElementById(`dur-${i}`);
    if (el) el.textContent = fmt(tmp.duration);
  });
});

// Media session (lock screen controls)
if ("mediaSession" in navigator) {
  navigator.mediaSession.metadata = new MediaMetadata({
    title: "The Long Game",
    artist: "Star Trek",
  });
  navigator.mediaSession.setActionHandler("play", () => btnPlay.click());
  navigator.mediaSession.setActionHandler("pause", () => btnPlay.click());
  navigator.mediaSession.setActionHandler("previoustrack", () => document.getElementById("btn-prev").click());
  navigator.mediaSession.setActionHandler("nexttrack", () => document.getElementById("btn-next").click());
  navigator.mediaSession.setActionHandler("seekbackward", () => document.getElementById("btn-rw").click());
  navigator.mediaSession.setActionHandler("seekforward", () => document.getElementById("btn-ff").click());

  audio.addEventListener("timeupdate", () => {
    if (currentIndex >= 0) {
      navigator.mediaSession.metadata = new MediaMetadata({
        title: scenes[currentIndex].title,
        artist: "Star Trek: The Long Game",
        album: "Grey Water",
      });
    }
  });
}
</script>
</body>
</html>
