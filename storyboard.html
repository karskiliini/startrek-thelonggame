      { type: "MEDIUM — KIRK ALONE", camera: "Holding the chip", action: "Kirk finds the unmapped door: public disclosure. Every neutral world watching. No war. A diplomatic catastrophe that sets Cardassia back 15 years.", dialogue: null },
      { type: "TWO-SHOT — KIRK & SORAK", camera: "Quiet room", action: "Sorak watches it happen. Not anger. Surprise at himself. The silence is the most eloquent thing he's said in 15 years.", dialogue: "SORAK: You've only postponed the inevitable by thirty years.\nKIRK: It's up to the next generation to postpone by another thirty." },
    ]
  },
  {
    id: "14",
    title: "Scene 14 — ANYONE'S TO WIN",
    location: "INT. ENTERPRISE / INT. STARFLEET COMMAND / INT. USS CENTAUR",
    shots: [
      { type: "MEDIUM — VIEWSCREEN", camera: "Klingon Ambassador, formal", action: "Ambassador: K'Tagh acted against explicit orders. All captains warned. A lie. Kirk knows it. Ambassador knows Kirk knows.", dialogue: "AMBASSADOR: The actions of one rogue officer do not reflect..." },
      { type: "WIDE — REVIEW BOARD", camera: "Formal room, five officers", action: "Voss at center. Hummer's file. Kirk stands: 'Give him a ship.' Voss signs. No comment.", dialogue: "KIRK: That is the only quality that matters when everything else fails. Give him a ship." },
      { type: "TWO-SHOT — KIRK & McCOY", camera: "Enterprise bridge, two glasses", action: "Two old friends. Grey water. 'Still foggy.' / 'At least it's not red.' Kirk looks at Spock: 'How about a scotch?'", dialogue: "McCOY: Still foggy.\nKIRK: At least it's not red." },
      { type: "WIDE — USS CENTAUR BRIDGE", camera: "Small ship, young crew", action: "Hummer walks onto his bridge. His chair. Pours a glass of water. Grey. Drinks it. Turns to his console. Begins.", dialogue: null },
    ]
  },
];

// Build navigation
const nav = document.getElementById('scene-nav');
scenes.forEach(s => {
  const a = document.createElement('a');
  a.href = `#scene-${s.id}`;
  a.textContent = s.id;
  a.title = s.title;
  nav.appendChild(a);
});

// Build storyboard
const main = document.getElementById('storyboard');
scenes.forEach(scene => {
  const section = document.createElement('section');
  section.className = 'scene';
  section.id = `scene-${scene.id}`;

  const header = document.createElement('div');
  header.className = 'scene-header';
  header.innerHTML = `<h2>${scene.title}</h2><div class="location">${scene.location}</div>`;
  section.appendChild(header);

  const grid = document.createElement('div');
  grid.className = 'shots';

  scene.shots.forEach((shot, i) => {
    const card = document.createElement('div');
    card.className = 'shot';

    let dialogueHtml = '';
    if (shot.dialogue) {
      const lines = shot.dialogue.split('\n').map(line => {
        const match = line.match(/^([A-Z\s']+?):\s*(.*)$/);
        if (match) {
          return `<span class="speaker">${match[1]}:</span> ${match[2]}`;
        }
        return line;
      }).join('\n');
      dialogueHtml = `<div class="shot-dialogue">${lines}</div>`;
    }

    card.innerHTML = `
      <div class="shot-image">
        <span class="shot-type">${shot.type}</span>
        <span class="camera-icon">${shot.camera}</span>
      </div>
      <div class="shot-info">
        <div class="shot-number">#${i + 1}</div>
        <div class="shot-action">${shot.action}</div>
        ${dialogueHtml}
      </div>
    `;
    grid.appendChild(card);
  });

  section.appendChild(grid);
  main.appendChild(section);
});

// Highlight active nav on scroll
const observer = new IntersectionObserver(entries => {
  entries.forEach(e => {
    if (e.isIntersecting) {
      nav.querySelectorAll('a').forEach(a => a.classList.remove('active'));
      const active = nav.querySelector(`a[href="#${e.target.id}"]`);
      if (active) active.classList.add('active');
    }
  });
}, { threshold: 0.3 });
document.querySelectorAll('.scene').forEach(s => observer.observe(s));

// Audio player
const audioSelect = document.getElementById('audio-select');
const audioElement = document.getElementById('audio-element');
audioSelect.addEventListener('change', () => {
  audioElement.src = audioSelect.value;
  audioElement.play();
});
// Default to full
audioElement.src = audioSelect.value;
</script>
